# LiveBridge - MediaMTX config otimizado para menor latência

logLevel: warn

# Desabilitar protocolos não usados
rtsp: false
srt: false
webrtc: false

# RTMP - OBS publica aqui
rtmp: true
rtmpAddress: :1935

# HLS Low-Latency (~5-10s, com áudio)
hls: true
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: lowLatency
hlsAlwaysRemux: true
hlsSegmentCount: 4
hlsSegmentDuration: 1s
hlsPartDuration: 250ms
hlsSegmentMaxSize: 50M

# Path para rtmp://IP:1935/live/QUALQUERNOME
paths:
  "~^live/.+":
    source: publisher
