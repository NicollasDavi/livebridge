# LiveBridge - MediaMTX (HLS 10s — menos pedidos HTTP/seg que segmentos curtos; DVR 8h)

logLevel: warn

# Control API — usada por GET /api/live/transmissoes (só rede Docker; não expor 9997 na internet)
api: yes
apiAddress: :9997

# Prometheus (rede Docker; não mapear 9998 no host). Ver docker-compose.observability.yml
metrics: yes
metricsAddress: :9998

# O perfil interno predefinido do MediaMTX só permite action:api a partir de 127.0.0.1.
# O contentor da API Node contacta o MediaMTX com IP da bridge Docker → 401 sem esta regra.
# Seguro aqui porque :9997 não está mapeado para o host no docker-compose.
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

# Desabilitar protocolos não usados
rtsp: false
srt: false
webrtc: false

# RTMP - OBS publica aqui
rtmp: true
rtmpAddress: :1935

# HLS (com áudio)
hls: true
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: mpegts
hlsAlwaysRemux: true
# DVR ~8h: 2880 × 10s = 28800s (10s = menos ficheiros em disco e menos auth_request/nginx por minuto)
hlsSegmentCount: 2880
hlsSegmentDuration: 10s
hlsSegmentMaxSize: 50M
hlsDirectory: /hls

# Path para rtmp://IP:1935/live/QUALQUERNOME
# Variantes ABR: transcode-abr.sh. record: no aqui — gravar 3× em paralelo no mesmo fluxo que já faz HLS + x264
# causava [recorder] detected drift em loop, I/O e CPU a mais → "reader is too slow", Broken pipe e 404 no HLS.
# Gravação para merge/lesson-boundary fica só no ingest em live/<stream> (abaixo); o merge gera 1080/720/480 por encode.
paths:
  "~^live/.+_(1080|720|480)$":
    source: publisher
    record: no
  # Nome desta regex deve ordenar *depois* da linha acima no MediaMTX (ordem lexicográfica).
  # Exige um único segmento após live/ (ex.: live/matematica), sem live/a/b aninhado.
  "~^live/[^/]+$":
    source: publisher
    record: yes
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
    recordFormat: mpegts
    recordSegmentDuration: 60s
    recordDeleteAfter: 0s
    # Imagem Docker: bluenviron/mediamtx:latest-ffmpeg (script transcode-abr.sh)
    runOnReady: sh /transcode-abr.sh
    runOnReadyRestart: yes
