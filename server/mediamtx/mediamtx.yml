# LiveBridge - MediaMTX config otimizado para menor latência

logLevel: warn

# Desabilitar protocolos não usados
rtsp: false
srt: false
webrtc: false

# RTMP - OBS publica aqui
rtmp: true
rtmpAddress: :1935

# HLS (com áudio)
hls: true
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: mpegts
hlsAlwaysRemux: true
hlsSegmentCount: 2
hlsSegmentDuration: 1s
hlsSegmentMaxSize: 50M

# Path para rtmp://IP:1935/live/QUALQUERNOME
paths:
  "~^live/.+":
    source: publisher
    record: yes
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S
    recordFormat: mpegts
    recordSegmentDuration: 60s
    recordDeleteAfter: 0s
