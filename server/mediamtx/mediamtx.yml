# LiveBridge - MediaMTX config otimizado para menor latência

logLevel: warn

# Desabilitar protocolos não usados (economiza recursos)
rtsp: false
srt: false

# RTMP - OBS publica aqui
rtmp: true
rtmpAddress: :1935

# HLS Low-Latency (~5-10s de delay)
hls: true
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: lowLatency
hlsAlwaysRemux: true
hlsSegmentCount: 4
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M

# WebRTC - < 1 segundo de latência
webrtc: true
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcAdditionalHosts: []
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
webrtcSTUNGatherTimeout: 5s
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s

# Paths: live/xxx = OBS publica | live_w/xxx = transcodificado para WebRTC (com áudio)
paths:
  "~^live/(.+)$":
    source: publisher
    runOnReady: ffmpeg -i rtmp://localhost:1935/live/$G1 -c:v copy -c:a libopus -b:a 128k -f flv rtmp://localhost:1935/live_w/$G1
    runOnReadyRestart: yes
  "~^live_w/(.+)$":
    source: publisher
