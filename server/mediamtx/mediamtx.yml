# LiveBridge - MediaMTX config otimizado para menor latência

logLevel: warn

# Desabilitar protocolos não usados (economiza recursos)
rtsp: false
srt: false

# RTMP - OBS publica aqui
rtmp: true
rtmpAddress: :1935

# HLS Low-Latency (fallback - pausa/voltar)
hls: true
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: mpegts
hlsAlwaysRemux: true
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsSegmentMaxSize: 50M

# WebRTC - < 1 segundo de latência
webrtc: true
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcAdditionalHosts: []
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
webrtcSTUNGatherTimeout: 5s
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s

# Path para rtmp://IP:1935/live/QUALQUERNOME
paths:
  "~^live/.+":
    source: publisher
