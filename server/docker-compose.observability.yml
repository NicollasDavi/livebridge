# Observabilidade opcional: Prometheus, Grafana, Alertmanager, Loki, Promtail, exporters.
# Comando: docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# A API usa CLUSTER_WORKERS=1 e PROMETHEUS_METRICS=1 para /metrics coerentes.
# Grafana: http://HOST:3001; Prometheus: 9090; Alertmanager UI: 127.0.0.1:9093; Loki: só na rede interna.
# Loki+Promtail: requer Linux com Docker (logs em /var/lib/docker/containers). Não aplica a Docker Desktop Windows da mesma forma.

services:
  api:
    environment:
      CLUSTER_WORKERS: '1'
      PROMETHEUS_METRICS: '1'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: livebridge-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - '127.0.0.1:9093:9093'

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: livebridge-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      - alertmanager
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - '9090:9090'

  loki:
    image: grafana/loki:2.9.4
    container_name: livebridge-loki
    restart: unless-stopped
    # root evita EACCES no volume anónimo; em produção podes mapear UID 10001 da imagem
    user: root
    depends_on:
      - alertmanager
    command:
      - -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro

  promtail:
    image: grafana/promtail:2.9.4
    container_name: livebridge-promtail
    restart: unless-stopped
    user: root
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki
    volumes:
      - ./loki/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: livebridge-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_LOG_LEVEL: ${GRAFANA_LOG_LEVEL:-info}
      GF_SERVER_ROOT_URL: '%(protocol)s://%(domain)s:%(http_port)s/'
    volumes:
      - grafana-data:/var/lib/grafana
      # Tudo o provisionamento (datasources + dashboards JSON em provisioning/dashboards/dashs)
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - '3001:3000'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: livebridge-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: livebridge-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: livebridge-blackbox
    restart: unless-stopped
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    container_name: livebridge-nginx-exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://nginx:8080/internal/nginx_status

volumes:
  grafana-data:
  loki-data:
