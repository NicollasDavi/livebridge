# Incluído em cada server { } — regex tem prioridade sobre location /hls/ prefix.
# Um MISS por segmento no MediaMTX; demais clientes: HIT ou espera (proxy_cache_lock).

location ~ "^/hls/(.+\.ts)$" {
    auth_request /internal/check-video-access;
    proxy_cache hls_segment_cache;
    proxy_cache_valid 200 30m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 8s;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    add_header X-Cache-Status $upstream_cache_status always;
    proxy_pass http://mediamtx_hls/$1;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_buffering on;
    proxy_read_timeout 86400s;
}

location ~ "^/api/hls/(.+\.ts)$" {
    auth_request /internal/check-video-access;
