# Substitui o /etc/nginx/nginx.conf da imagem (montado pelo docker-compose) para suportar
# muitas ligações simultâneas (ex.: milhares de players HLS) e cache de segmentos.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;

    # Menos handshakes TLS em picos de audiência
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;

    include /etc/nginx/conf.d/*.conf;
}
