map $request_uri $hls_stream {
    default "";
    ~^/api/hls/live/([^/]+)/ $1;
    ~^/hls/live/([^/]+)/ $1;
}

# Keepalive para reduzir handshake TCP em rajadas de segmentos HLS (.m3u8 + muitos .ts).
upstream mediamtx_hls {
    server mediamtx:8888;
    keepalive 512;
}

upstream api_node {
    server api:3000;
    keepalive 256;
}

upstream merge_svc {
    server merge:8080;
    keepalive 16;
}

# HTTP porta 80 — redirect para HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTP porta 8080 — sem redirect (dev: acesse via 8081)
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Métricas Prometheus (nginx-prometheus-exporter na rede Docker). Não expor na internet.
    location /internal/nginx_status {
        stub_status on;
        access_log off;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
    }

    location /merge-api/ {
        proxy_pass http://merge_svc/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    include /etc/nginx/includes/hls-ts-locations.conf;

    location /api/ {
        proxy_pass http://api_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_set_header Range $http_range;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location = /api/recordings/video {
        proxy_pass http://api_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_set_header Range $http_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # main_stream.m3u8 404 = path HLS ainda não existe ou mux reiniciou (MediaMTX/FFmpeg). Não usar index.m3u8
    # como fallback: no MediaMTX costuma ser um *segundo* master (#EXT-X-STREAM-INF), não media playlist → hls.js falha.
    # 503 + Retry-After: muitos players/hls.js voltam a pedir; 404 puro tende a ser tratado como fim do stream.
    location ~ "^(/api)?/hls/live/([^/]+)/main_stream\.m3u8$" {
        auth_request /internal/check-video-access;
        proxy_intercept_errors on;
        error_page 404 = @hls_main_manifest_upstream_404;
        proxy_pass http://mediamtx_hls/live/$2/main_stream.m3u8;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    location @hls_main_manifest_upstream_404 {
        internal;
        default_type text/plain;
        add_header Retry-After 2 always;
        add_header Cache-Control no-store always;
        add_header X-LiveBridge-Hls 404-to-503 always;
        return 503 "HLS manifest temporarily unavailable\n";
    }

    # LIVE_HLS_PATH_PREFIX=/api/hls — variantes do master devem ir ao MediaMTX, não à API Node.
    location /api/hls/ {
        auth_request /internal/check-video-access;
        proxy_pass http://mediamtx_hls/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    location /hls/ {
        auth_request /internal/check-video-access;
        proxy_pass http://mediamtx_hls/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    location = /internal/check-video-access {
        internal;
        proxy_pass http://api_node/api/check-video-access?stream=$hls_stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_request_body off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS (certificado autoassinado)
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
