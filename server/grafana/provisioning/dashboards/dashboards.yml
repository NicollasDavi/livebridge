# Dashboards .json no diretório montado em /etc/grafana/dashboards (ver docker-compose.observability.yml)
apiVersion: 1

providers:
  - name: LiveBridge
    orgId: 1
    folder: LiveBridge
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/dashboards
