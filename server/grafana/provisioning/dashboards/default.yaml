# Ficheiros JSON de dashboards em: provisioning/dashboards/dashs/ (só .json, não o default.yaml)
apiVersion: 1

providers:
  - name: LiveBridge
    orgId: 1
    folder: LiveBridge
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/dashs
