services:
  mediamtx:
    # *-ffmpeg: inclui ffmpeg para runOnReady (ABR 1080/720/480 — ver mediamtx.yml)
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: livebridge-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx/transcode-abr.sh:/transcode-abr.sh:ro
      - ./recordings:/recordings
      - mediamtx-hls:/hls
    ports:
      - "1935:1935"   # RTMP (OBS)
      # 8888 não exposto — HLS só via nginx (porta 8081) com auth

  merge:
    build: ./merge
    container_name: livebridge-merge
    restart: unless-stopped
    environment:
      RECORDINGS_DIR: /recordings
      MERGE_CALLBACK_URL: http://api:3000
      COMPRESS_VIDEO: ${COMPRESS_VIDEO:-1}
      # Máxima compactação: HEVC + preset lento (mais CPU/tempo, menor arquivo)
      COMPRESS_CODEC: ${COMPRESS_CODEC:-h265}
      COMPRESS_PRESET: ${COMPRESS_PRESET:-veryslow}
      COMPRESS_CRF: ${COMPRESS_CRF:-28}
      COMPRESS_CRF_H264: ${COMPRESS_CRF_H264:-23}
      COMPRESS_CRF_H265: ${COMPRESS_CRF_H265:-28}
      COMPRESS_AUDIO_BITRATE: ${COMPRESS_AUDIO_BITRATE:-64k}
      # Três MP4 no R2 (1080/720/480) + progresso por resolução. single = um session.mp4 (legado)
      MERGE_RESOLUTIONS: ${MERGE_RESOLUTIONS:-1080,720,480}
      FFMPEG_TIMEOUT_MS: ${FFMPEG_TIMEOUT_MS:-43200000}
      MERGE_ENCODE_CONCURRENCY: ${MERGE_ENCODE_CONCURRENCY:-1}
      MERGE_PROGRESS_THROTTLE_MS: ${MERGE_PROGRESS_THROTTLE_MS:-400}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-livebridge}
    volumes:
      - ./recordings:/recordings
    ports:
      - "8082:8080"

  api:
    build: ./api
    container_name: livebridge-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VIDEO_ACCESS_SECRET: ${VIDEO_ACCESS_SECRET:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      USE_PRESIGNED: ${USE_PRESIGNED:-0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4200,http://localhost:8081,https://localhost,https://localhost:443}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-livebridge}
      LESSONS_API_URL: ${LESSONS_API_URL:-http://host.docker.internal:8080}
      LESSONS_API_TOKEN: ${LESSONS_API_TOKEN:-}
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
      SKIP_LESSONS_API: ${SKIP_LESSONS_API:-0}
      CHECK_VIDEO_ACCESS_CACHE_MS: ${CHECK_VIDEO_ACCESS_CACHE_MS:-1500}
      API_LOG_ALL_REQUESTS: ${API_LOG_ALL_REQUESTS:-0}
      RECORDINGS_PAGE_MAX_KEYS: ${RECORDINGS_PAGE_MAX_KEYS:-500}
      PENDING_READ_CONCURRENCY: ${PENDING_READ_CONCURRENCY:-8}
      RECORDINGS_DIR: /recordings
      MERGE_INTERNAL_URL: http://merge:8080
      VIDEOS_API_URL: ${VIDEOS_API_URL:-${LESSONS_API_URL}}
      VIDEOS_API_TOKEN: ${VIDEOS_API_TOKEN:-${LESSONS_API_TOKEN}}
    volumes:
      - ./recordings:/recordings

  nginx:
    image: nginx:alpine
    container_name: livebridge-player
    restart: unless-stopped
    depends_on:
      - api
      - mediamtx
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"

volumes:
  mediamtx-hls:
