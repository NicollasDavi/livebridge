services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: livebridge-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
      - mediamtx-hls:/hls
    ports:
      - "1935:1935"   # RTMP (OBS)
      - "8888:8888"   # HLS

  merge:
    build: ./merge
    container_name: livebridge-merge
    restart: unless-stopped
    environment:
      RECORDINGS_DIR: /recordings
      COMPRESS_VIDEO: ${COMPRESS_VIDEO:-1}
      COMPRESS_PRESET: ${COMPRESS_PRESET:-veryfast}
      COMPRESS_CRF: ${COMPRESS_CRF:-23}
      FFMPEG_TIMEOUT_MS: ${FFMPEG_TIMEOUT_MS:-43200000}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-livebridge}
    volumes:
      - ./recordings:/recordings
    ports:
      - "8082:8080"

  api:
    build: ./api
    container_name: livebridge-api
    restart: unless-stopped
    environment:
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      USE_PRESIGNED: ${USE_PRESIGNED:-0}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-livebridge}
      LESSONS_API_URL: ${LESSONS_API_URL:-http://host.docker.internal:8080}
      LESSONS_API_TOKEN: ${LESSONS_API_TOKEN:-}
      SKIP_LESSONS_API: ${SKIP_LESSONS_API:-0}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: livebridge-player
    restart: unless-stopped
    depends_on:
      - api
      - mediamtx
    volumes:
      - ./player:/usr/share/nginx/html:ro
      - ./player/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"

volumes:
  mediamtx-hls:
