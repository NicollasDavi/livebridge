services:
  mediamtx:
    # *-ffmpeg: inclui ffmpeg para runOnReady (ABR 1080/720/480 — ver mediamtx.yml)
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: livebridge-mediamtx
    restart: unless-stopped
    # Prioridade de CPU quando o contentor merge também corre (FFmpeg pós-aula).
    cpu_shares: 1024
    environment:
      # Repasse ao transcode-abr.sh (GOP alinhado a hlsSegmentDuration no mediamtx.yml)
      HLS_GOP_SEC: ${HLS_GOP_SEC:-10}
      TRANSCODE_PRESET: ${TRANSCODE_PRESET:-superfast}
      FFMPEG_THREAD_QUEUE_SIZE: ${FFMPEG_THREAD_QUEUE_SIZE:-4096}
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx/transcode-abr.sh:/transcode-abr.sh:ro
      - ./recordings:/recordings
      - mediamtx-hls:/hls
    # RTMP no host:80 → MediaMTX:1935 (firewall só 80/443). OBS: rtmp://IP:80/live/NOME
    # Nota: o host 80 não é HTTP nginx; usar só https://IP/ para o site. Certbot HTTP-01 exige DNS-01 ou pausa RTMP.
    ports:
      - "80:1935"
      # 8888 não exposto — HLS só via nginx com auth

  merge:
    build: ./merge
    container_name: livebridge-merge
    restart: unless-stopped
    # Menos CPU relativa que mediamtx — compactação HEVC não deve roubar tempo ao transcoder da live.
    cpu_shares: 256
    environment:
      RECORDINGS_DIR: /recordings
      MERGE_CALLBACK_URL: http://api:3000
      COMPRESS_VIDEO: ${COMPRESS_VIDEO:-1}
      # Máxima compactação: HEVC + preset lento (mais CPU/tempo, menor arquivo)
      COMPRESS_CODEC: ${COMPRESS_CODEC:-h265}
      COMPRESS_PRESET: ${COMPRESS_PRESET:-veryslow}
      COMPRESS_CRF: ${COMPRESS_CRF:-28}
      COMPRESS_CRF_H264: ${COMPRESS_CRF_H264:-23}
      COMPRESS_CRF_H265: ${COMPRESS_CRF_H265:-28}
      COMPRESS_AUDIO_BITRATE: ${COMPRESS_AUDIO_BITRATE:-64k}
      # Três MP4 no R2 (1080/720/480) + progresso por resolução. single = um session.mp4 (legado)
      MERGE_RESOLUTIONS: ${MERGE_RESOLUTIONS:-1080,720,480}
      FFMPEG_TIMEOUT_MS: ${FFMPEG_TIMEOUT_MS:-43200000}
      MERGE_ENCODE_CONCURRENCY: ${MERGE_ENCODE_CONCURRENCY:-1}
      MERGE_PROGRESS_THROTTLE_MS: ${MERGE_PROGRESS_THROTTLE_MS:-400}
      # Resumo "[merge] Scan: N stream(s)…": só quando N muda (padrão). Heartbeat opcional: MERGE_SCAN_SUMMARY_INTERVAL_MS=3600000
      MERGE_SCAN_SUMMARY: ${MERGE_SCAN_SUMMARY:-1}
      MERGE_SCAN_SUMMARY_INTERVAL_MS: ${MERGE_SCAN_SUMMARY_INTERVAL_MS:-0}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-livebridge}
    volumes:
      - ./recordings:/recordings
    # Só localhost — a API chama merge na rede Docker; não precisa de porta pública.
    ports:
      - "127.0.0.1:8082:8080"

  api:
    build: ./api
    container_name: livebridge-api
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VIDEO_ACCESS_SECRET: ${VIDEO_ACCESS_SECRET:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      USE_PRESIGNED: ${USE_PRESIGNED:-0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4200,http://localhost:8081,https://localhost,https://localhost:443,https://api.posihub.com.br}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-livebridge}
      LESSONS_API_URL: ${LESSONS_API_URL:-http://host.docker.internal:8080}
      LESSONS_API_TOKEN: ${LESSONS_API_TOKEN:-}
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
      SKIP_LESSONS_API: ${SKIP_LESSONS_API:-0}
      CHECK_VIDEO_ACCESS_CACHE_MS: ${CHECK_VIDEO_ACCESS_CACHE_MS:-25000}
      # auto = um processo Node por núcleo (máx. 32); 1 = single (dev). Requer mais RAM por worker.
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-auto}
      API_LOG_ALL_REQUESTS: ${API_LOG_ALL_REQUESTS:-0}
      RECORDINGS_PAGE_MAX_KEYS: ${RECORDINGS_PAGE_MAX_KEYS:-500}
      PENDING_READ_CONCURRENCY: ${PENDING_READ_CONCURRENCY:-8}
      RECORDINGS_DIR: /recordings
      MERGE_INTERNAL_URL: http://merge:8080
      # Opcional: timeout do fetch da API ao merge (ms). Ex.: 604800000 = 7d, se proxy cortar ligações longas.
      MERGE_POST_TIMEOUT_MS: ${MERGE_POST_TIMEOUT_MS:-0}
      MEDIAMTX_CONTROL_API_URL: ${MEDIAMTX_CONTROL_API_URL:-http://mediamtx:9997}
      MEDIAMTX_PATHS_CACHE_MS: ${MEDIAMTX_PATHS_CACHE_MS:-3000}
      LESSON_BOUNDARY_MERGE_DELAY_MS: ${LESSON_BOUNDARY_MERGE_DELAY_MS:-8000}
      LESSON_BOUNDARY_LINK_CONCURRENCY: ${LESSON_BOUNDARY_LINK_CONCURRENCY:-12}
      # Master HLS: variantes em /api/hls (default, alinha Next/BFF). Para paths absolutos /hls no M3U8: LIVE_HLS_PATH_PREFIX=/hls
      LIVE_HLS_PATH_PREFIX: ${LIVE_HLS_PATH_PREFIX:-/api/hls}
      LIVE_HLS_VARIANT_PLAYLIST: ${LIVE_HLS_VARIANT_PLAYLIST:-main_stream.m3u8}
      # JSON: URLs absolutas para o browser usar o BFF (Spring em :8080). Vazio no .env = só paths relativos.
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:8080}
      VIDEOS_API_URL: ${VIDEOS_API_URL:-${LESSONS_API_URL}}
      VIDEOS_API_TOKEN: ${VIDEOS_API_TOKEN:-${LESSONS_API_TOKEN}}
    volumes:
      - ./recordings:/recordings

  nginx:
    image: nginx:alpine
    container_name: livebridge-player
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - api
      - mediamtx
    volumes:
      - ./nginx/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/00-hls-cache.conf:/etc/nginx/conf.d/00-hls-cache.conf:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx-hls-cache:/var/cache/nginx/hls
    ports:
      - "443:443"
      # HTTP interno só no localhost (evita expor 8081 na internet)
      - "127.0.0.1:8081:8080"

volumes:
  mediamtx-hls:
  nginx-hls-cache:
