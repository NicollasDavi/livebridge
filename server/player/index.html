<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveBridge — Player ao vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #16161a;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.3);
            --text: #e4e4e7;
            --text-muted: #71717a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container { width: 100%; max-width: 900px; }
        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }
        .player-wrap {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .video-container { position: relative; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; display: block; }
        .controls {
            padding: 1rem 1.25rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
        }
        .btn {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-play { background: var(--accent); color: var(--bg); }
        .btn-play:hover { background: #00e6b8; }
        .btn-live {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn-live:hover { background: rgba(0, 212, 170, 0.2); }
        .btn-live::before { content: "● "; color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .btn-webrtc { background: #3b82f6; color: #fff; }
        .btn-webrtc:hover { background: #2563eb; }
        .seek-wrap { flex: 1; min-width: 120px; display: flex; align-items: center; gap: 0.5rem; }
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg);
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .time { font-size: 0.8rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; min-width: 4rem; }
        .status { font-size: 0.75rem; color: var(--text-muted); padding: 0.25rem 0.5rem; background: var(--bg); border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
        .status.live { color: var(--accent); }
        .form-wrap {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: var(--surface);
            border-radius: 12px;
        }
        .form-wrap label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .form-wrap input {
            width: 100%;
            padding: 0.6rem 1rem;
            background: var(--bg);
            border: 1px solid #27272a;
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }
        .form-wrap input:focus { outline: none; border-color: var(--accent); }
        .form-wrap .btns { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .form-wrap .btn { margin-top: 0; }
        .form-wrap .hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.75rem; }
        .error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; }
        .hidden { display: none !important; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tab {
            padding: 0.5rem 1rem;
            border: none;
            background: var(--bg);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { background: var(--accent-dim); color: var(--accent); }
        .tab-content { margin-top: 0.5rem; }
        .recordings-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.75rem; max-height: 200px; overflow-y: auto; }
        .rec-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid #27272a;
        }
        .rec-item .info { font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; }
        .rec-item .info small { color: var(--text-muted); font-size: 0.75rem; }
        .rec-item .btn { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LiveBridge</h1>
        <div class="player-wrap hidden" id="playerWrap">
            <div class="video-container">
                <video id="video" playsinline controls></video>
            </div>
            <div class="controls" id="hlsControls">
                <button type="button" class="btn btn-play" id="btnPlay">▶ Pausar</button>
                <button type="button" class="btn btn-live" id="btnLive">Ir ao vivo</button>
                <div class="seek-wrap">
                    <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
                    <span class="time" id="time">--:-- / ao vivo</span>
                </div>
                <span class="status" id="status">Carregando...</span>
            </div>
        </div>
        <div class="form-wrap" id="formWrap">
            <div class="tabs">
                <button type="button" class="tab active" data-tab="live">Ao vivo</button>
                <button type="button" class="tab" data-tab="recordings">Gravações</button>
            </div>
            <div class="tab-content active" id="tabLive">
                <label for="streamName">Nome do stream</label>
                <input type="text" id="streamName" placeholder="Ex: teste" autocomplete="off">
                <div class="btns">
                    <button type="button" class="btn btn-play" id="btnHLS">Assistir ao vivo</button>
                </div>
                <p class="hint">No OBS: intervalo de keyframe = 1 ou 2 segundos (Saída → Configuração do encoder)</p>
            </div>
            <div class="tab-content hidden" id="tabRecordings">
                <p class="hint">Transmissões gravadas no R2</p>
                <div id="recordingsList" class="recordings-list"></div>
                <p class="hint" id="recordingsEmpty">Carregando...</p>
            </div>
            <div class="error hidden" id="error"></div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
        const video = document.getElementById('video');
        const btnPlay = document.getElementById('btnPlay');
        const btnLive = document.getElementById('btnLive');
        const seek = document.getElementById('seek');
        const timeEl = document.getElementById('time');
        const statusEl = document.getElementById('status');
        const hlsControls = document.getElementById('hlsControls');
        const formWrap = document.getElementById('formWrap');
        const streamNameInput = document.getElementById('streamName');
        const btnHLS = document.getElementById('btnHLS');
        const errorEl = document.getElementById('error');

        const baseUrl = window.location.origin; // mesma origem = sem CORS
        let hls = null;

        function getHLSUrl(name) {
            return baseUrl + '/hls/live/' + encodeURIComponent(name) + '/index.m3u8';
        }

        function showError(msg) { errorEl.textContent = msg; errorEl.classList.remove('hidden'); }
        function hideError() { errorEl.classList.add('hidden'); }

        document.getElementById('btnHLS').addEventListener('click', () => {
            const name = streamNameInput.value.trim();
            if (!name) { showError('Digite o nome do stream.'); return; }
            hideError();
            initHLSPlayer(name);
        });

        streamNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); btnHLS.click(); }
        });

        function updateTime() {
            if (!video.seekable.length) { timeEl.textContent = isVodMode ? '--:-- / --:--' : '--:-- / ao vivo'; return; }
            const end = video.seekable.end(video.seekable.length - 1);
            const curr = video.currentTime;
            if (isVodMode) {
                timeEl.textContent = formatTime(curr) + ' / ' + formatTime(end);
            } else {
                const lag = end - curr;
                timeEl.textContent = lag < 2 ? 'ao vivo' : formatTime(curr) + ' / ao vivo (−' + Math.round(lag) + 's)';
            }
        }
        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }
        function goToLive() {
            if (!video.seekable.length) return;
            video.currentTime = video.seekable.end(video.seekable.length - 1);
            updateTime();
        }
        function updateSeekBar() {
            if (!video.seekable.length) return;
            const end = video.seekable.end(video.seekable.length - 1);
            const start = video.seekable.start(0);
            const range = end - start;
            if (range <= 0) return;
            seek.value = ((video.currentTime - start) / range) * 100;
        }

        let isVodMode = false;

        btnPlay.addEventListener('click', () => {
            if (video.paused) { video.play(); btnPlay.textContent = '⏸ Pausar'; }
            else { video.pause(); btnPlay.textContent = '▶ Reproduzir'; }
        });
        btnLive.addEventListener('click', goToLive);
        seek.addEventListener('input', () => {
            if (!video.seekable.length) return;
            const start = video.seekable.start(0);
            const end = video.seekable.end(video.seekable.length - 1);
            const range = end - start;
            if (range <= 0) return;
            video.currentTime = start + (parseFloat(seek.value) / 100) * range;
        });
        video.addEventListener('play', () => { btnPlay.textContent = '⏸ Pausar'; });
        video.addEventListener('pause', () => { btnPlay.textContent = '▶ Reproduzir'; });

        const params = new URLSearchParams(window.location.search);
        const streamParam = params.get('stream');
        if (streamParam) {
            streamNameInput.value = streamParam;
            try { initHLSPlayer(streamParam); } catch (e) { console.error(e); showError('Erro: ' + e.message); }
        }

        // Tabs
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
                t.classList.add('active');
                const id = t.dataset.tab === 'live' ? 'tabLive' : 'tabRecordings';
                document.getElementById(id).classList.remove('hidden');
                if (t.dataset.tab === 'recordings') loadRecordings();
            });
        });

        function loadRecordings() {
            const list = document.getElementById('recordingsList');
            const empty = document.getElementById('recordingsEmpty');
            list.innerHTML = '';
            empty.textContent = 'Carregando...';
            empty.classList.remove('hidden');
            fetch('/api/recordings')
                .then(r => r.json().then(data => ({ ok: r.ok, data })))
                .then(({ ok, data: recordings }) => {
                    empty.classList.add('hidden');
                    if (!ok && recordings?.error) {
                        empty.textContent = recordings.error;
                        empty.classList.remove('hidden');
                        return;
                    }
                    if (!recordings?.length) {
                        empty.textContent = 'Nenhuma gravação encontrada.';
                        empty.classList.remove('hidden');
                        return;
                    }
                    recordings.forEach(rec => {
                        const streamLabel = rec.path.split('/').pop() || rec.path;
                        const el = document.createElement('div');
                        el.className = 'rec-item';
                        el.innerHTML = `
                            <span class="info">${streamLabel} <small>${rec.date}</small></span>
                            <button type="button" class="btn btn-play">Assistir</button>
                        `;
                        el.querySelector('.btn').addEventListener('click', () => {
                            const url = `/api/recordings/playlist?path=${encodeURIComponent(rec.path)}&session=${encodeURIComponent(rec.session)}`;
                            initHLSPlayer(streamLabel, url, true);
                        });
                        list.appendChild(el);
                    });
                })
                .catch(err => {
                    empty.textContent = 'Erro ao carregar gravações: ' + err.message;
                    empty.classList.remove('hidden');
                });
        }

        function initHLSPlayer(streamName, hlsUrl, isVod = false) {
            if (typeof Hls === 'undefined') {
                showError('Erro ao carregar o player. Verifique se há bloqueador de anúncios ou firewall.');
                return;
            }
            isVodMode = isVod;
            const url = hlsUrl || getHLSUrl(streamName);
            statusEl.textContent = 'Conectando...';
            statusEl.classList.remove('live');
            hlsControls.classList.remove('hidden');
            var btnLiveEl = document.querySelector('.btn-live');
            if (btnLiveEl) btnLiveEl.classList.toggle('hidden', isVod);

            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); hls = null; }
                hls = new Hls({
                    liveSyncDurationCount: 1,
                    liveMaxLatencyDurationCount: 2,
                    liveDurationInfinity: !isVod,
                    maxBufferLength: isVod ? 30 : 3,
                    maxMaxBufferLength: isVod ? 60 : 6
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    statusEl.textContent = isVod ? 'Gravação pronta' : 'Stream pronto';
                    statusEl.classList.add('live');
                    video.play().catch(() => {});
                });
                hls.on(Hls.Events.ERROR, (e, d) => {
                    if (d.fatal) {
                        statusEl.textContent = 'Erro';
                        let msg = d.type === Hls.ErrorTypes.NETWORK_ERROR
                            ? (isVod ? 'Gravação não encontrada ou segmento com erro.' : 'Stream não encontrado. Inicie a transmissão no OBS primeiro.')
                            : (d.details || 'Erro') + (d.reason ? ': ' + d.reason : '') + (d.response ? ' (HTTP ' + d.response.code + ')' : '');
                        showError(msg);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => { video.play().catch(() => {}); });
            } else {
                showError('Navegador não suporta HLS.');
                return;
            }

            video.ontimeupdate = () => { updateTime(); updateSeekBar(); };
            video.onseeked = updateSeekBar;

            document.getElementById('playerWrap').classList.remove('hidden');
            formWrap.classList.add('hidden');
        }
        }); // DOMContentLoaded
    </script>
</body>
</html>
