name: Deploy LiveBridge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-livebridge.yml'

concurrency:
  group: deploy-livebridge
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt/livebridge"; fi
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout main
            git pull origin main
            cd server
            COMPOSE_ARGS="-f docker-compose.yml"
            if [ -f docker-compose.observability.yml ]; then
              COMPOSE_ARGS="$COMPOSE_ARGS -f docker-compose.observability.yml"
            fi
            docker compose $COMPOSE_ARGS pull
            docker compose $COMPOSE_ARGS build --pull
            docker compose $COMPOSE_ARGS up -d
